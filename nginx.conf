server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- PERFORMANCE OPTIMIZATIONS ---
    
    # 1. Gzip Compression (More aggressive)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        image/svg+xml;

    # 2. Aggressive Caching for Hashed Assets (JS/CSS from Vite)
    # Vite adds hashes like index-hash.js, so they never change.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # 3. Main Route & HTML (No cache to ensure updates are picked up)
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 4. Security & Performance Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Health check endpoint
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
